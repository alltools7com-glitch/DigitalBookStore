<script>
// ─────────────────────────────────────────────────────────────────────────────
// HOW TO SETUP FIREBASE (free, 2 minute):
// 1. Go to https://console.firebase.google.com
// 2. "Create a project" → give any name → Continue
// 3. Left sidebar → "Build" → "Realtime Database" → Create → Test mode → Done
// 4. Left sidebar → "Build" → "Storage" → Get started → Test mode → Done
// 5. Left sidebar → Project Settings (gear icon) → "Your apps" → </> Web → Register
// 6. Copy the firebaseConfig values below
// ─────────────────────────────────────────────────────────────────────────────
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyAPJ2Dn2nxxoesgv0NZ-Xtw0MtpBWBUhbQ",
  authDomain:        "digitalbookstore-32ed4.firebaseapp.com",
  databaseURL:       "https://digitalbookstore-32ed4-default-rtdb.firebaseio.com",
  projectId:         "digitalbookstore-32ed4",
  storageBucket:     "digitalbookstore-32ed4.firebasestorage.app",
  messagingSenderId: "701831474481",
  appId:             "1:701831474481:web:41554b05401f6ee4b3d410",
};
// ─────────────────────────────────────────────────────────────────────────────

const FB_ON = !!(FIREBASE_CONFIG.databaseURL && FIREBASE_CONFIG.databaseURL.includes("firebaseio.com"));
let fireDB = null;
if (FB_ON) {
  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    fireDB = firebase.database();
    console.log("✅ Firebase connected — real-time sync active");
  } catch(e) { console.warn("Firebase init failed:", e.message); }
} else {
  console.log("ℹ️ Firebase not configured — using localStorage");
}

// ── Universal Data Layer ──────────────────────────────────────────────────────
const DB = {
  listen(key, cb) {
    if (fireDB) {
      const ref = fireDB.ref(key);
      ref.on('value', snap => { cb(snap.val()); });
      return () => ref.off('value');
    }
    try { const s = localStorage.getItem(key); if(s) cb(JSON.parse(s)); } catch {}
    return () => {};
  },
  set(key, val) {
    if (fireDB) return fireDB.ref(key).set(val);
    try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
    return Promise.resolve();
  },
  // Cover image — store base64 directly in Realtime Database (free, no Storage needed)
  async uploadImage(file, bookId) {
    return new Promise((resolve, reject) => {
      if (file.size > 500 * 1024) {
        // Compress large images before storing
        const img = new Image();
        const url = URL.createObjectURL(file);
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const MAX = 600;
          let w = img.width, h = img.height;
          if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          const base64 = canvas.toDataURL('image/jpeg', 0.75);
          URL.revokeObjectURL(url);
          if (fireDB) {
            fireDB.ref('dbs_covers/' + bookId).set(base64)
              .then(() => resolve(base64))
              .catch(() => { localStorage.setItem('dbs_cover_' + bookId, base64); resolve(base64); });
          } else {
            try { localStorage.setItem('dbs_cover_' + bookId, base64); } catch {}
            resolve(base64);
          }
        };
        img.onerror = () => reject(new Error('Image load failed'));
        img.src = url;
      } else {
        const reader = new FileReader();
        reader.onload = ev => {
          const base64 = ev.target.result;
          if (fireDB) {
            fireDB.ref('dbs_covers/' + bookId).set(base64)
              .then(() => resolve(base64))
              .catch(() => { localStorage.setItem('dbs_cover_' + bookId, base64); resolve(base64); });
          } else {
            try { localStorage.setItem('dbs_cover_' + bookId, base64); } catch {}
            resolve(base64);
          }
        };
        reader.readAsDataURL(file);
      }
    });
  },
  async deleteImage(bookId) {
    if (fireDB) { try { await fireDB.ref('dbs_covers/' + bookId).remove(); } catch {} }
    try { localStorage.removeItem('dbs_cover_' + bookId); } catch {}
  },
  async reset(keys) {
    if (fireDB) {
      const updates = {};
      keys.forEach(k => updates[k] = null);
      updates['dbs_covers'] = null;
      await fireDB.ref().update(updates);
    } else {
      keys.forEach(k => { try { localStorage.removeItem(k); } catch {} });
    }
  }
};
</script>

// BOOKS TAB
const BooksTab = () => {
  const [books,setBooks]=useState(INIT_BOOKS);
  const [saving,setSaving]=useState(false);
  useEffect(()=>{ const unsub=DB.listen('dbs_books',data=>{if(data){const arr=Array.isArray(data)?data:Object.values(data);setBooks(arr);}else{setBooks(INIT_BOOKS);}});return unsub;},[]);
  const [search,setSearch]=useState(""),cat=useState("All"),modal=useState(null),form=useState({title:"",author:"",price:"",originalPrice:"",category:"Business",status:"Active",description:"",pages:"",rating:""}),toast=useState(""),del2=useState(null);
  const [ct,setCt]=cat;const [mo,setMo]=modal;const [fm,setFm]=form;const [ts,setTs]=toast;const [dc,setDc]=del2;
  const [coverPreview,setCoverPreview]=useState(null);
  const [coverFile,setCoverFile]=useState(null);
  const [pdfName,setPdfName]=useState("");
  const filtered=books.filter(b=>(ct==="All"||b.category===ct)&&(b.title.toLowerCase().includes(search.toLowerCase())||b.author.toLowerCase().includes(search.toLowerCase())));
  const openAdd=()=>{setFm({title:"",author:"",price:"",originalPrice:"",category:"Business",status:"Active",description:"",pages:"",rating:""});setCoverPreview(null);setCoverFile(null);setPdfName("");setMo("add");};
  const openEdit=b=>{
    setFm({...b,price:String(b.price),originalPrice:String(b.originalPrice||""),pages:String(b.pages||""),description:b.description||"",rating:String(b.rating||"4.8")});
    setCoverPreview(b.coverUrl||null);setCoverFile(null);
    // Load PDF name from Firebase or localStorage
    if(fireDB){
      fireDB.ref('dbs_pdfs/'+b.id+'/name').once('value').then(snap=>{setPdfName(snap.val()||"");}).catch(()=>setPdfName(""));
    } else {
      try{const pn=localStorage.getItem("dbs_pdfname_"+b.id);setPdfName(pn||"");}catch{setPdfName("");}
    }
    setMo(b);
  };
  const handleCoverUpload=e=>{
    const file=e.target.files[0];
    if(!file)return;
    if(file.size>2*1024*1024){alert("Image max 2MB!");return;}
    const reader=new FileReader();
    reader.onload=ev=>setCoverPreview(ev.target.result);
    reader.readAsDataURL(file);
    setCoverFile(file);
  };
  const handlePdfUpload=e=>{
    const file=e.target.files[0];
    if(!file)return;
    if(file.size>15*1024*1024){alert("PDF max 15MB allowed!");return;}
    setPdfName(file.name+"  ⏳ Loading...");
    const reader=new FileReader();
    reader.onload=ev=>{setFm(f=>({...f,_pdfData:ev.target.result,_pdfName:file.name}));setPdfName(file.name);};
    reader.onerror=()=>{setPdfName("");alert("File read nahi hua, dobara try karo.");};
    reader.readAsDataURL(file);
  };
  const save=async()=>{
    if(!fm.title||!fm.author||!fm.price)return;
    setSaving(true);
    const bookId=mo==="add"?Date.now():fm.id;
    let coverUrl=fm.coverUrl||null;
    if(coverFile){coverUrl=await DB.uploadImage(coverFile,bookId);}
    // ── Save PDF to Firebase Realtime Database (not localStorage) ──
    if(fm._pdfData){
      try{
        if(fireDB){
          await fireDB.ref('dbs_pdfs/'+bookId).set({data:fm._pdfData,name:fm._pdfName||'book.pdf'});
        } else {
          // localStorage fallback — only works for small PDFs
          localStorage.setItem("dbs_pdf_"+bookId, fm._pdfData);
          localStorage.setItem("dbs_pdfname_"+bookId, fm._pdfName||"book.pdf");
        }
      }catch(e){alert("PDF save nahi hua: "+e.message);}
    }
    const cleanFm={...fm};delete cleanFm._pdfData;delete cleanFm._pdfName;delete cleanFm._coverData;
    let newBooks;
    if(mo==="add"){newBooks=[...books,{...cleanFm,id:bookId,coverUrl,price:parseFloat(fm.price)||9.99,originalPrice:parseFloat(fm.originalPrice)||parseFloat((parseFloat(fm.price)*1.8).toFixed(2)),pages:parseInt(fm.pages)||220,sales:0,rating:parseFloat(fm.rating)||5.0}];}
    else{newBooks=books.map(b=>b.id===fm.id?{...b,...cleanFm,coverUrl,price:parseFloat(fm.price),originalPrice:parseFloat(fm.originalPrice)||b.originalPrice,pages:parseInt(fm.pages)||b.pages,rating:parseFloat(fm.rating)||b.rating}:b);}
    setBooks(newBooks);
    await DB.set('dbs_books',newBooks);
    setSaving(false);setMo(null);setTs(mo==="add"?"✅ Book added!":"💾 Book updated!");
  };
  const del=async id=>{
    const newBooks=books.filter(b=>b.id!==id);
    setBooks(newBooks);
    await DB.set('dbs_books',newBooks);
    await DB.deleteImage(id);
    // Delete PDF from Firebase
    try{ if(fireDB) await fireDB.ref('dbs_pdfs/'+id).remove(); }catch{}
    try{localStorage.removeItem("dbs_pdf_"+id);localStorage.removeItem("dbs_pdfname_"+id);}catch{}
    setDc(null);setTs("Book deleted.");
  };
  const tog=async id=>{const newBooks=books.map(b=>b.id===id?{...b,status:b.status==="Active"?"Inactive":"Active"}:b);setBooks(newBooks);await DB.set('dbs_books',newBooks);};
  return <div className="fade-in">
    {ts&&<Toast msg={ts} onClose={()=>setTs("")}/>}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20,flexWrap:"wrap",gap:12}}>
      <h1 className="playfair" style={{fontSize:26,fontWeight:700}}>Books <span style={{fontSize:14,color:"var(--text3)",fontWeight:400}}>({filtered.length})</span></h1>
      <button className="btn btn-gold" style={{padding:"9px 18px",fontSize:13}} onClick={openAdd}>+ Add Book</button>
    </div>
    <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap"}}>
      <input placeholder="🔍 Search books..." value={search} onChange={e=>setSearch(e.target.value)} style={{flex:"1 1 180px",maxWidth:280}}/>
      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
        {["All",...ALL_CATS].map(c=><button key={c} onClick={()=>setCt(c)} className="btn" style={{padding:"6px 11px",fontSize:11,border:`1px solid ${ct===c?"var(--gold)":"var(--border)"}`,background:ct===c?"rgba(201,168,76,.12)":"var(--surface2)",color:ct===c?"var(--gold)":"var(--text2)"}}>{c}</button>)}
      </div>
    </div>
    <div className="card" style={{overflow:"hidden"}}><div style={{overflowX:"auto"}}><table>
      <thead><tr><th style={{width:50}}>Cover</th><th>Title</th><th>Author</th><th>Category</th><th>Price</th><th>Sales</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody>{filtered.map(b=>{
        let coverImg=b.coverUrl||null;if(!coverImg){try{coverImg=localStorage.getItem("dbs_cover_"+b.id);}catch(e){}}
        return <tr key={b.id}>
        <td>
          {coverImg
            ?<img src={coverImg} alt="" style={{width:36,height:50,objectFit:"cover",borderRadius:5,display:"block"}}/>
            :<div style={{width:36,height:50,background:`linear-gradient(145deg,#1a1208,rgba(201,168,76,0.3))`,borderRadius:5,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:"#C9A84C"}}>{b.title.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase()}</div>
          }
        </td>
        <td style={{fontWeight:500,maxWidth:180,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{b.title}</td>
        <td style={{color:"var(--text2)"}}>{b.author}</td>
        <td><span className="tag" style={{background:"var(--surface2)",color:"var(--text3)"}}>{b.category}</span></td>
        <td><span className="mono" style={{color:"var(--gold)",fontWeight:600}}>{fmt(b.price)}</span></td>
        <td style={{color:"var(--text2)"}}>{b.sales}</td>
        <td><SBadge s={b.status}/></td>
        <td><div style={{display:"flex",gap:5}}>
          <button className="btn btn-ghost" style={{padding:"4px 9px",fontSize:11}} onClick={()=>openEdit(b)}>Edit</button>
          <button className="btn" style={{padding:"4px 9px",fontSize:11,background:"rgba(201,168,76,.08)",border:"1px solid rgba(201,168,76,.2)",color:"var(--gold)"}} onClick={()=>tog(b.id)}>{b.status==="Active"?"Pause":"Resume"}</button>
          <button className="btn btn-danger" style={{padding:"4px 9px",fontSize:11}} onClick={()=>setDc(b.id)}>Del</button>
        </div></td>
      </tr>;})}
      </tbody>
    </table></div></div>
    {mo!==null&&<div className="modal-bg" onClick={e=>e.target===e.currentTarget&&setMo(null)}><div className="modal fade-in" style={{padding:28}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:22}}>
        <h2 className="playfair" style={{fontSize:20,fontWeight:700}}>{mo==="add"?"➕ Add New Book":"✏️ Edit Book"}</h2>
        <button className="btn btn-ghost" style={{padding:"5px 9px"}} onClick={()=>setMo(null)}>✕</button>
      </div>
      <div style={{display:"grid",gap:14}}>

        {/* ── Cover Image Upload ── */}
        <div>
          <label>📸 Book Cover Image</label>
          <div style={{display:"flex",gap:14,alignItems:"flex-start"}}>
            <div style={{width:80,height:110,borderRadius:8,overflow:"hidden",background:"var(--surface2)",border:"2px dashed var(--border)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,cursor:"pointer",position:"relative"}}
              onClick={()=>document.getElementById("coverInput").click()}>
              {coverPreview
                ? <img src={coverPreview} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                : <div style={{textAlign:"center",fontSize:11,color:"var(--text3)",padding:6}}><div style={{fontSize:24,marginBottom:4}}>🖼️</div>Click to upload</div>
              }
            </div>
            <div style={{flex:1}}>
              <input id="coverInput" type="file" accept="image/*" style={{display:"none"}} onChange={handleCoverUpload}/>
              <button className="btn btn-ghost" style={{width:"100%",padding:"9px",fontSize:12,marginBottom:8}} onClick={()=>document.getElementById("coverInput").click()}>
                📷 {coverPreview?"Change Cover Image":"Upload Cover Image"}
              </button>
              {coverPreview&&<button className="btn btn-danger" style={{width:"100%",padding:"7px",fontSize:11}} onClick={()=>{setCoverPreview(null);setFm(f=>({...f,_coverData:null}));}}>🗑️ Remove Image</button>}
              <div style={{fontSize:10,color:"var(--text3)",marginTop:6}}>JPG, PNG, WebP • Max 2MB</div>
            </div>
          </div>
        </div>

        {/* ── PDF Upload ── */}
        <div style={{background:"rgba(201,168,76,0.06)",border:"1px solid rgba(201,168,76,0.2)",borderRadius:10,padding:"12px 14px"}}>
          <label>📄 PDF File Upload {fireDB&&<span style={{color:"var(--green)",fontSize:10,fontWeight:600,marginLeft:6}}>☁️ Firebase mein save hoga</span>}</label>
          <input id="pdfInput" type="file" accept=".pdf,application/pdf" style={{display:"none"}} onChange={handlePdfUpload}/>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <button className="btn btn-ghost" style={{flex:1,padding:"9px",fontSize:12}} onClick={()=>document.getElementById("pdfInput").click()}>
              📤 {pdfName&&!pdfName.includes("⏳")?"Change PDF":"Upload PDF"}
            </button>
            {pdfName&&!pdfName.includes("⏳")&&<button className="btn btn-danger" style={{padding:"9px 12px",fontSize:11}} onClick={()=>{setPdfName("");setFm(f=>({...f,_pdfData:null,_pdfName:""}));}}>✕</button>}
          </div>
          {pdfName
            ? <div style={{marginTop:8,fontSize:12,color:pdfName.includes("⏳")?"var(--gold)":"var(--green)",display:"flex",alignItems:"center",gap:6}}>
                <span>{pdfName.includes("⏳")?"⏳":"✅"}</span>
                <span style={{fontFamily:"DM Mono",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{pdfName}</span>
              </div>
            : <div style={{fontSize:10,color:"var(--text3)",marginTop:6}}>PDF file • Max 15MB • Firebase mein save hoga (har device pe accessible)</div>
          }
        </div>

        <div><label>Book Title *</label><input placeholder="Title" value={fm.title} onChange={e=>setFm({...fm,title:e.target.value})}/></div>
        <div><label>Author *</label><input placeholder="Author" value={fm.author} onChange={e=>setFm({...fm,author:e.target.value})}/></div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <div><label>Price (USD) *</label><input placeholder="19.99" value={fm.price} onChange={e=>setFm({...fm,price:e.target.value})}/></div>
          <div><label>Original Price</label><input placeholder="39.99" value={fm.originalPrice} onChange={e=>setFm({...fm,originalPrice:e.target.value})}/></div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <div><label>Category</label><select value={fm.category} onChange={e=>setFm({...fm,category:e.target.value})}>{ALL_CATS.map(c=><option key={c}>{c}</option>)}</select></div>
          <div><label>Pages</label><input placeholder="220" value={fm.pages} onChange={e=>setFm({...fm,pages:e.target.value})}/></div>
        </div>
        <div><label>Description</label><textarea placeholder="Short book description..." value={fm.description} onChange={e=>setFm({...fm,description:e.target.value})} style={{resize:"vertical",minHeight:70}}/></div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <div><label>Rating (1-5)</label><input type="number" min="1" max="5" step="0.1" placeholder="4.8" value={fm.rating||""} onChange={e=>setFm({...fm,rating:e.target.value})}/></div>
          <div><label>Status</label><select value={fm.status} onChange={e=>setFm({...fm,status:e.target.value})}><option>Active</option><option>Inactive</option></select></div>

      <div style={{display:"flex",gap:10,marginTop:22}}>

// ORDERS TAB
const OrdersTab = () => {
  const [orders,setOrders]=useState(INIT_ORDERS);
  useEffect(()=>{ const unsub=DB.listen('dbs_orders',data=>{if(data){const arr=Array.isArray(data)?data:Object.values(data);setOrders(arr);}else setOrders(INIT_ORDERS);});return unsub;},[]);
  const [filter,setFilter]=useState("All"),search=useState(""),toast=useState("");
  const [sr,setSr]=search;const [ts,setTs]=toast;
  const filtered=orders.filter(o=>(filter==="All"||o.status===filter)&&(o.customer.toLowerCase().includes(sr.toLowerCase())||o.id.includes(sr)||o.book.toLowerCase().includes(sr.toLowerCase())));
  const upd=async(id,st)=>{const newOrders=orders.map(o=>o.id===id?{...o,status:st}:o);setOrders(newOrders);await DB.set('dbs_orders',newOrders);setTs(`Order ${id} → ${st}`);};

        <div>2. Build → <strong>Realtime Database</strong> → Create → Test mode</div>
        <div>3. Build → <strong>Storage</strong> → Get started → Test mode</div>
        <div>4. Project Settings → Your apps → Web → Register → Copy config</div>
        <div style={{marginTop:8}}>5. Admin.html file mein <strong style={{color:"var(--gold)"}}>FIREBASE_CONFIG</strong> section mein paste karo (line ~60)</div>
      </div>}
    </div>
    <div className="card" style={{padding:22,marginBottom:14}}>
      <div style={{fontWeight:700,fontSize:14,marginBottom:16,paddingBottom:10,borderBottom:"1px solid var(--border)"}}>🏪 Store Settings</div>
      <div style={{display:"grid",gap:13}}>
        <div><label>Store Name</label><input value={form.storeName} onChange={h("storeName")}/></div>
        <div><label>Contact Email</label><input value={form.email} onChange={h("email")}/></div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <div><label>Currency</label><select value={form.currency} onChange={h("currency")}><option>USD</option><option>EUR</option><option>GBP</option><option>PKR</option></select></div>
          <div><label>Tax Rate (%)</label><input placeholder="0" value={form.tax} onChange={h("tax")}/></div>
        </div>
      </div>
      <div style={{marginTop:14,display:"grid",gap:10}}>
        {[["maintenance","🔧 Maintenance Mode","Disable store for visitors"],["reviews","⭐ Customer Reviews","Allow customers to leave reviews"],["downloads","⬇️ Auto Downloads","Send download link after purchase"]].map(([k,l,s])=><label key={k} style={{display:"flex",alignItems:"center",gap:12,cursor:"pointer",background:"var(--surface2)",padding:"11px 14px",borderRadius:9,border:"1px solid var(--border)"}}>
          <input type="checkbox" checked={form[k]} onChange={h(k)} style={{width:16,height:16,accentColor:"var(--gold)"}}/>
          <div><div style={{fontWeight:500,fontSize:13,color:"var(--text)"}}>{l}</div><div style={{fontSize:11,color:"var(--text3)"}}>{s}</div></div>
        </label>)}
      </div>
      <button className="btn btn-gold" style={{marginTop:16,padding:"10px 22px",fontSize:13}} onClick={()=>setToast("Settings saved!")}>Save Settings</button>
    </div>
    <div className="card" style={{padding:22,marginBottom:14}}>
      <div style={{fontWeight:700,fontSize:14,marginBottom:16,paddingBottom:10,borderBottom:"1px solid var(--border)"}}>💳 Payment Settings</div>
      <div style={{display:"grid",gap:13}}>
        <div><label>PayPal.me Link</label><input value={payInfo.paypal_link} onChange={e=>setPayInfo({...payInfo,paypal_link:e.target.value})}/></div>
        <div><label>PayPal Email</label><input value={payInfo.paypal_email} onChange={e=>setPayInfo({...payInfo,paypal_email:e.target.value})}/></div>
        <div><label>Bitcoin (BTC) Address</label><input value={payInfo.btc} onChange={e=>setPayInfo({...payInfo,btc:e.target.value})} style={{fontFamily:"DM Mono",fontSize:12}}/></div>
        <div><label>UPI ID</label><input value={payInfo.upi} onChange={e=>setPayInfo({...payInfo,upi:e.target.value})}/></div>
      </div>
      <div style={{marginTop:14,padding:"10px 14px",background:"rgba(201,168,76,0.06)",border:"1px solid rgba(201,168,76,0.15)",borderRadius:8,fontSize:12,color:"var(--text2)"}}>
        💡 Yahan payment details update karo — store ke checkout page pe automatically reflect hongi
      </div>
      <button className="btn btn-gold" style={{marginTop:14,padding:"10px 22px",fontSize:13}} onClick={()=>setToast("Payment settings saved!")}>Save Payment Settings</button>
    </div>
    <div className="card" style={{padding:22,marginBottom:14}}>
      <div style={{fontWeight:700,fontSize:14,marginBottom:16,paddingBottom:10,borderBottom:"1px solid var(--border)"}}>🔒 Change Password</div>
      <div style={{display:"grid",gap:13}}>
        <div><label>Current Password</label><input type="password" placeholder="••••••••" value={pass.current} onChange={e=>setPass({...pass,current:e.target.value})}/></div>
        <div><label>New Password</label><input type="password" placeholder="••••••••" value={pass.newp} onChange={e=>setPass({...pass,newp:e.target.value})}/></div>
        <div><label>Confirm New Password</label><input type="password" placeholder="••••••••" value={pass.confirm} onChange={e=>setPass({...pass,confirm:e.target.value})}/></div>
      </div>
      <button className="btn btn-gold" style={{marginTop:16,padding:"10px 22px",fontSize:13}} onClick={()=>{if(pass.newp&&pass.newp===pass.confirm){setToast("Password updated!");setPass({current:"",newp:"",confirm:""});}else setToast("Passwords do not match!");}}>Update Password</button>
    </div>
    <div className="card" style={{padding:22,border:"1px solid rgba(224,92,75,.25)"}}>
      <div style={{fontWeight:700,fontSize:14,marginBottom:10,color:"var(--red)"}}>⚠️ Danger Zone</div>
      <p style={{fontSize:13,color:"var(--text2)",marginBottom:14}}>Irreversible actions. Proceed with caution.</p>
      <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
        <button className="btn btn-danger" style={{padding:"10px 20px",fontSize:13}} onClick={onLogout}>🚪 Logout from Admin</button>
        <button className="btn btn-danger" style={{padding:"10px 20px",fontSize:13}} onClick={async()=>{if(window.confirm("Sab data reset hoga — INIT data wapas aa jayega. Sure ho?")){await DB.reset(['dbs_books','dbs_orders','dbs_customers','dbs_coupons','dbs_cats','dbs_msgs']);setToast("Data reset! Page refresh karo.");}}}>🔄 Reset All Data</button>
      </div>
    </div>
  </div>;
};

// MAIN APP
function App() {
  const [auth,setAuth]=useState(false);
  const [tab,setTab]=useState("dashboard");
  const [sbOpen,setSbOpen]=useState(false);
  if(!auth) return <Login onLogin={()=>setAuth(true)}/>;
  const render=()=>{switch(tab){case"dashboard":return<Dashboard/>;case"books":return<BooksTab/>;case"orders":return<OrdersTab/>;case"customers":return<CustomersTab/>;case"coupons":return<CouponsTab/>;case"categories":return<CategoriesTab/>;case"messages":return<MessagesTab/>;case"settings":return<SettingsTab onLogout={()=>setAuth(false)}/>;default:return<Dashboard/>;}};
  return <div className="admin-layout">
    <div className={`sidebar-overlay${sbOpen?" open":""}`} onClick={()=>setSbOpen(false)}/>
    <div className={`sidebar${sbOpen?" open":""}`}><Sidebar tab={tab} setTab={setTab} onClose={()=>setSbOpen(false)}/></div>
    <div className="main-area">
      <div className="topbar">
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <button className="btn btn-ghost hamburger-btn" style={{padding:"6px 10px",fontSize:18,display:"none"}} onClick={()=>setSbOpen(!sbOpen)}>☰</button>
          <div><span style={{fontSize:14,fontWeight:600,textTransform:"capitalize"}}>{tab}</span><span style={{fontSize:11,color:"var(--text3)",marginLeft:8}}>DigitalBookStore Admin</span></div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{fontSize:11,color:"var(--text3)",display:"flex",alignItems:"center",gap:5}}><span style={{width:7,height:7,borderRadius:"50%",background:"var(--green)",display:"inline-block",animation:"pulse2 2s infinite"}}/>Live</div>
          <a href="index.html" style={{fontSize:12,color:"var(--gold)",textDecoration:"none",display:"flex",alignItems:"center",gap:4}} title="Go to Store">🏪 View Store</a>
          <a href="mailto:dcsystem77@gmail.com" style={{fontSize:12,color:"var(--gold)",textDecoration:"none"}}>📧 Support</a>
          <button className="btn btn-ghost" style={{padding:"6px 12px",fontSize:12}} onClick={()=>setAuth(false)}>Logout</button>
        </div>
      </div>
      <div className="content">{render()}</div>
    </div>
  </div>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script></body></html>
