const getLiveBooks = () => {
  try {
    const s = localStorage.getItem('dbs_books');
    if (!s) return BOOKS;
    const adminBooks = JSON.parse(s);
    return adminBooks
      .filter(ab => ab.status !== 'Inactive')
      .map((ab, idx) => {
        const storeBook = BOOKS.find(b => b.id === ab.id);
        if (storeBook) return { ...storeBook, ...ab, price: parseFloat(ab.price) || storeBook.price };
        const ci = idx % COVER_COLORS.length;
        const initials = ab.title.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
        return {
          cover: initials,
          color: COVER_COLORS[ci],
          bg: COVER_BGS[ci],
          originalPrice: ab.originalPrice || parseFloat((ab.price * 1.8).toFixed(2)),
          description: ab.description || `A premium eBook on ${ab.category}. Instant PDF + EPUB download after purchase.`,
          pages: ab.pages || 220,
          format: 'PDF + EPUB',
          bestseller: false,
          featured: false,
          reviews: ab.sales || 0,
          rating: ab.rating || 4.7,
          toc: [],
          benefits: ["Instant download after purchase","PDF + EPUB included","Lifetime access","30-day money back"],
          ...ab,
          price: parseFloat(ab.price) || 9.99,
        };
      });
  } catch(e) { return BOOKS; }
};

const saveOrderToAdmin = (cart, name1, name2, email, method, finalAmt, txnId) => {
  try {
    const existing = JSON.parse(localStorage.getItem('dbs_orders') || '[]');
    const now = new Date();
    const dateStr = now.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
    const timeStr = now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
    const orderId = '#ORD-' + (Date.now()+'').slice(-6);
    const methodLabel = method==='paypal'?'PayPal':method==='upi'?'UPI':'Bitcoin';
    const fullName = (name1+' '+name2).trim() || 'Guest';
    const bookTitles = cart.map(b=>b.title).join(', ');
    const newOrder = {
      id: orderId,
      customer: fullName,
      email: email || 'N/A',
      book: bookTitles,
      amount: parseFloat(finalAmt),
      date: dateStr,
      status: 'Pending',
      paymentMethod: methodLabel,
      books: cart.length,
      txnId: txnId || '',
    };
    const updated = [newOrder, ...existing];
    localStorage.setItem('dbs_orders', JSON.stringify(updated));

    // ── Send Email Notification via EmailJS ──
    try {
      emailjs.send("service_z65jsrk", "gwosq2o", {
        order_id:        orderId,
        customer_name:   fullName,
        customer_email:  email || 'N/A',
        books:           bookTitles,
        amount:          '$' + parseFloat(finalAmt).toFixed(2),
        payment_method:  methodLabel,
        order_date:      dateStr + ' ' + timeStr,
        name:            fullName,
        message:         `New order ${orderId} — ${bookTitles} — $${parseFloat(finalAmt).toFixed(2)} via ${methodLabel}${txnId?' — TXN: '+txnId:''}`,
        email:           email || 'N/A',
      });
    } catch(emailErr) { console.warn('Email notification failed:', emailErr); }

  } catch(e) { console.error('Order save failed:', e); }
};

function App() {
  const [page, setPage] = useState("home");
  const [dark, setDark] = useState(()=>{
    try{ const s=localStorage.getItem('dbs_theme'); return s!==null ? s==='dark' : true; }catch{ return true; }
  });
  const [cart, setCart] = useState([]);
  const [selectedBook, setSelectedBook] = useState(LIVE_BOOKS[0]);
  const [user, setUser] = useState(null);
  useEffect(()=>{ try{ localStorage.setItem('dbs_theme', dark?'dark':'light'); }catch{} },[dark]);
  useEffect(()=>{window.scrollTo({top:0,behavior:"smooth"});},[page]);
  const renderPage = () => {
    switch(page) {
      case "home": return <HomePage setPage={setPage} setSelectedBook={setSelectedBook} cart={cart} setCart={setCart}/>;
      case "store": return <StorePage setPage={setPage} setSelectedBook={setSelectedBook} cart={cart} setCart={setCart}/>;
      case "book": return <BookPage book={selectedBook} setPage={setPage} cart={cart} setCart={setCart}/>;
      case "checkout": return <CheckoutPage cart={cart} setCart={setCart} setPage={setPage}/>;
      case "auth": return <AuthPage setPage={setPage} setUser={setUser}/>;
      case "dashboard": return <DashboardPage user={user} setPage={setPage}/>;
      // admin page removed
      case "blog": return <BlogPage/>;
      case "faq": return <FAQPage/>;
      case "contact": return <ContactPage/>;
      case "refund": return <RefundPage/>;
      case "privacy": return <PrivacyPage/>;
      default: return <HomePage setPage={setPage} setSelectedBook={setSelectedBook} cart={cart} setCart={setCart}/>;
    }
  };
  return (
    <>
      <GlobalStyles dark={dark}/>
      <Nav page={page} setPage={setPage} dark={dark} setDark={setDark} cart={cart} user={user} setUser={setUser}/>
      <main className="fade-in">{renderPage()}</main>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
